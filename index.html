<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PortableAI – Final Neural Monolith</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    width: 100%;
    background: #000;
    font-family: system-ui, sans-serif;
  }

  #three-root {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  #coreZone {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 2;
  }

  #coreCanvas {
    width: 40vmin;
    height: 40vmin;
  }

  #hud {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(0, 0, 0, 0.6);
    color: #cfcfe8;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    z-index: 3;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="three-root"></div>

<div id="coreZone">
  <canvas id="coreCanvas"></canvas>
</div>

<div id="hud">PortableAI · Neural Validator läuft</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>
/* ============================================================
   TEIL 1: UNIVERSE SETUP
============================================================ */

const threeRoot = document.getElementById("three-root");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
threeRoot.appendChild(renderer.domElement);

/* >>> PortableAI Universe Hooks <<< */
window.__PAI_SCENE__ = scene;
window.__PAI_CAMERA__ = camera;
window.__PAI_RENDERER__ = renderer;
window.__PAI_UPDATES__ = window.__PAI_UPDATES__ || [];

/* ============================================================
   TEIL 2: BACKGROUND SPHERE
============================================================ */

const sphereGeometry = new THREE.SphereGeometry(50, 128, 128);
sphereGeometry.scale(-1, 1, 1);

const sphereMaterial = new THREE.MeshBasicMaterial({
  map: new THREE.TextureLoader().load("https://threejs.org/examples/textures/galaxy_starfield.png")
});

scene.add(new THREE.Mesh(sphereGeometry, sphereMaterial));

/* ============================================================
   TEIL 3: PORTAL + NODE
============================================================ */

const portalGeometry = new THREE.PlaneGeometry(20, 12);
const portalMaterial = new THREE.MeshBasicMaterial({
  color: 0x8844ff,
  opacity: 0.25,
  transparent: true
});
const portal = new THREE.Mesh(portalGeometry, portalMaterial);
portal.position.set(0, 0, -30);
scene.add(portal);

const nodeGroup = new THREE.Group();
scene.add(nodeGroup);

const nodeGeometry = new THREE.IcosahedronGeometry(2, 1);
const nodeMaterial = new THREE.MeshStandardMaterial({
  color: 0x9b5bff,
  roughness: 0.3,
  metalness: 0.7,
  emissive: 0x3b0f66,
  emissiveIntensity: 0.8
});
const nodeCore = new THREE.Mesh(nodeGeometry, nodeMaterial);
nodeCore.position.set(0, 0, -30);
nodeGroup.add(nodeCore);

const nodeLight = new THREE.PointLight(0xaa66ff, 2, 80);
nodeLight.position.set(5, 5, -20);
nodeGroup.add(nodeLight);

/* ============================================================
   TEIL 4: VALIDATOR CORE (2D)
============================================================ */

const coreCanvas = document.getElementById("coreCanvas");
const coreCtx = coreCanvas.getContext("2d");

function resizeCore() {
  coreCanvas.width = coreCanvas.offsetWidth;
  coreCanvas.height = coreCanvas.offsetHeight;
}
resizeCore();

window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  resizeCore();
});

let tCore = 0;

function drawCore() {
  const w = coreCanvas.width;
  const h = coreCanvas.height;
  const r = Math.min(w, h) / 2;

  coreCtx.clearRect(0, 0, w, h);

  const pulse = 0.05 * Math.sin(tCore * 0.03);

  coreCtx.save();
  coreCtx.translate(w / 2, h / 2);

  const grad = coreCtx.createRadialGradient(0, 0, r * 0.1, 0, 0, r * (1 + pulse));
  grad.addColorStop(0, "rgba(40, 0, 80, 0.95)");
  grad.addColorStop(0.4, "rgba(10, 0, 30, 0.85)");
  grad.addColorStop(1, "rgba(0, 0, 0, 0.0)");

  coreCtx.fillStyle = grad;
  coreCtx.beginPath();
  coreCtx.arc(0, 0, r * (1 + pulse), 0, Math.PI * 2);
  coreCtx.fill();

  coreCtx.restore();
  tCore++;
}

/* ============================================================
   TEIL 5: ANIMATION
============================================================ */

function animate() {
  requestAnimationFrame(animate);

  sphere.rotation.y += 0.0008;
  sphere.rotation.x += 0.0003;

  portal.position.z = -30 + Math.sin(Date.now() * 0.001) * 0.7;
  portal.rotation.y = Math.sin(Date.now() * 0.0005) * 0.1;

  nodeCore.rotation.x += 0.01;
  nodeCore.rotation.y += 0.013;

  drawCore();
  renderer.render(scene, camera);
}

animate();
</script>

<!-- >>> Universe Loader MUSS GANZ UNTEN STEHEN <<< -->
<script src="universe/loader.js"></script>

</body>
</html>
